<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{width:320px;min-height:340px;background:#0f1117;color:#e0e0e0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC",sans-serif;font-size:13px}
.header{background:linear-gradient(135deg,#0f1117,#1a1d2e);
  padding:14px 16px;border-bottom:1px solid #1f2937;
  display:flex;align-items:center;gap:10px}
.logo{width:36px;height:36px;border-radius:8px;background:#141826;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-size:18px;font-weight:900;color:#fff;font-family:monospace;
  border:1.5px solid #2a2d3e;position:relative;overflow:hidden}
.logo::after{content:'';position:absolute;width:9px;height:9px;
  border-radius:50%;bottom:4px;right:4px;background:#dc2626}
.lang-btn{background:#1a1d2e;border:1px solid #2a2d3e;color:#6b7280;
  padding:3px 10px;border-radius:12px;cursor:pointer;font-size:11px;
  font-weight:700;font-family:inherit;flex-shrink:0;transition:all .15s}
.lang-btn:hover{border-color:#3b82f6;color:#3b82f6}
.header-text{flex:1}
.header-text h1{font-size:14px;font-weight:700;color:#f9fafb}
.header-text p{font-size:10px;color:#6b7280;margin-top:1px}

.env-card{margin:12px 16px;border-radius:10px;padding:14px 16px;
  display:flex;align-items:center;gap:12px;border:1.5px solid #1f2937;
  background:#1a1d2e;transition:border-color .2s}
.env-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.env-name{font-size:22px;font-weight:700;font-family:monospace}
.env-source{font-size:10px;color:#6b7280;margin-top:2px}
.env-host{font-size:11px;color:#4b5563;padding:0 16px 4px;
  word-break:break-all;font-family:monospace}

.section{padding:0 16px 12px}
.sec-title{font-size:10px;color:#4b5563;text-transform:uppercase;
  letter-spacing:.06em;padding:8px 0 6px}

.btn-row{display:flex;gap:6px}
.btn{flex:1;padding:7px 4px;border-radius:6px;font-size:11px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:all .15s;border:1.5px solid #2a2d3e;
  background:#141826;color:#6b7280}
.btn:hover{opacity:.85}
.btn.prod{border-color:#7f1d1d;color:#fca5a5}
.btn.staging{border-color:#7c2d12;color:#fdba74}
.btn.dev{border-color:#1e3a5f;color:#93c5fd}
.btn.clr{border-color:#2a2d3e;color:#4b5563}
.btn.prod.active{background:#dc2626;border-color:#dc2626;color:#fff}
.btn.staging.active{background:#f97316;border-color:#f97316;color:#fff}
.btn.dev.active{background:#3b82f6;border-color:#3b82f6;color:#fff}

.toggle-row{display:flex;align-items:center;justify-content:space-between;
  background:#1a1d2e;border:1px solid #1f2937;border-radius:8px;
  padding:10px 12px;margin-bottom:8px}
.toggle-row span{font-size:12px}
.toggle-row small{font-size:10px;color:#6b7280;display:block}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:#1f2937;border-radius:20px;
  cursor:pointer;transition:background .2s}
.slider:before{content:'';position:absolute;width:14px;height:14px;
  left:3px;top:3px;background:#6b7280;border-radius:50%;transition:all .2s}
input:checked+.slider{background:#3b82f6}
input:checked+.slider:before{transform:translateX(16px);background:#fff}

.btn-ghost{width:100%;padding:8px;border:1px solid #1f2937;border-radius:6px;
  font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;
  background:#1a1d2e;color:#6b7280;transition:opacity .15s;margin-bottom:5px}
.btn-ghost:hover{opacity:.8}
.btn-ghost.active{color:#f59e0b;border-color:#78350f}

.footer{padding:6px 16px 12px;font-size:10px;color:#374151;text-align:center}
.footer a{color:#6b7280;text-decoration:none}.footer a:hover{color:#9ca3af}

.toast{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);
  background:#1f2937;color:#fff;font-size:11px;padding:5px 12px;
  border-radius:20px;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header">
  <div class="logo">K</div>
  <div class="header-text">
    <h1>EnvGuard</h1>
    <p id="h-sub">環境偵測 · 色條提示 · by Kerr</p>
  </div>
  <button class="lang-btn" id="lang-btn">EN</button>
</div>

<div class="env-card" id="env-card">
  <div class="env-dot" id="dot"></div>
  <div>
    <div class="env-name" id="env-name">—</div>
    <div class="env-source" id="source"></div>
  </div>
</div>
<div class="env-host" id="host"></div>

<div class="section">
  <div class="sec-title" id="lbl-mark">標記此網域為</div>
  <div class="btn-row">
    <button class="btn prod"    data-env="PROD">PROD</button>
    <button class="btn staging" data-env="STAGING">STAGING</button>
    <button class="btn dev"     data-env="DEV">DEV</button>
    <button class="btn clr"     data-env="clear" id="btn-clear-rule">清除</button>
  </div>
</div>

<div class="section">
  <div class="toggle-row">
    <div>
      <span id="lbl-unknown">❓ 未知環境顯示灰條</span>
      <small id="lbl-unknown-sub">關閉後未識別網站不顯示色條</small>
    </div>
    <label class="toggle">
      <input type="checkbox" id="toggle-unknown">
      <span class="slider"></span>
    </label>
  </div>
  <button class="btn-ghost" id="btn-whitelist">🚫 忽略此網域</button>
</div>

<div class="footer">
  Built by <a href="https://github.com/kerr20801" target="_blank">Kerr</a>
  · <a href="https://github.com/kerr20801" target="_blank">github.com/kerr20801</a>
</div>

<div class="toast" id="toast"></div>
<script src="popup.js"></script>
</body>
</html>
