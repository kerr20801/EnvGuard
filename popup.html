<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 280px; font: 14px -apple-system, sans-serif; color: #1f2937; background: #fff; }

  .header { padding: 14px 16px 10px; border-bottom: 1px solid #f3f4f6; }
  .title { font-size: 13px; font-weight: 700; letter-spacing: .04em; color: #6b7280; }

  .env-badge {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px 10px;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .env-name { font-size: 20px; font-weight: 700; }
  .source { font-size: 11px; color: #9ca3af; margin-top: 2px; }
  .host { font-size: 12px; color: #6b7280; padding: 0 16px 12px; word-break: break-all; }

  .divider { height: 1px; background: #f3f4f6; margin: 0 16px; }

  .section { padding: 12px 16px; }
  .section-label { font-size: 11px; font-weight: 600; color: #9ca3af; letter-spacing: .06em; margin-bottom: 8px; }

  .btn-row { display: flex; gap: 6px; }
  .btn {
    flex: 1; padding: 6px 4px; border: 1px solid #e5e7eb; border-radius: 6px;
    font: 600 12px -apple-system, sans-serif; cursor: pointer; background: #fff;
    transition: all .15s;
  }
  .btn:hover { border-color: #9ca3af; background: #f9fafb; }
  .btn.prod  { border-color: #fca5a5; color: #dc2626; }
  .btn.staging { border-color: #fed7aa; color: #f97316; }
  .btn.dev   { border-color: #bfdbfe; color: #3b82f6; }
  .btn.active { color: #fff; }
  .btn.prod.active  { background: #dc2626; border-color: #dc2626; }
  .btn.staging.active { background: #f97316; border-color: #f97316; }
  .btn.dev.active   { background: #3b82f6; border-color: #3b82f6; }

  .btn-whitelist {
    width: 100%; padding: 7px; border: 1px solid #e5e7eb; border-radius: 6px;
    font: 500 12px -apple-system, sans-serif; cursor: pointer; background: #fff;
    color: #6b7280; transition: all .15s;
  }
  .btn-whitelist:hover { background: #f9fafb; border-color: #9ca3af; }
  .btn-whitelist.active { background: #f3f4f6; color: #374151; border-color: #d1d5db; }

  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px;
  }
  .toggle-label { font-size: 12px; color: #4b5563; }
  .toggle {
    position: relative; width: 34px; height: 18px;
    background: #d1d5db; border-radius: 9px; cursor: pointer; transition: background .2s;
  }
  .toggle.on { background: #3b82f6; }
  .toggle::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 14px; height: 14px; background: #fff; border-radius: 50%; transition: left .2s;
  }
  .toggle.on::after { left: 18px; }

  .toast {
    position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
    background: #1f2937; color: #fff; font-size: 11px; padding: 5px 12px;
    border-radius: 20px; opacity: 0; transition: opacity .2s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="header"><div class="title">ENVGUARD</div></div>

<div class="env-badge">
  <div class="dot" id="dot"></div>
  <div>
    <div class="env-name" id="env-name">—</div>
    <div class="source" id="source"></div>
  </div>
</div>
<div class="host" id="host"></div>

<div class="divider"></div>
<div class="section">
  <div class="section-label">MARK THIS DOMAIN AS</div>
  <div class="btn-row">
    <button class="btn prod"    data-env="PROD">PROD</button>
    <button class="btn staging" data-env="STAGING">STAGING</button>
    <button class="btn dev"     data-env="DEV">DEV</button>
    <button class="btn"         data-env="clear">Clear</button>
  </div>
</div>

<div class="divider"></div>
<div class="section">
  <button class="btn-whitelist" id="btn-whitelist">Ignore this domain</button>
</div>

<div class="divider"></div>
<div class="toggle-row">
  <span class="toggle-label">Show grey bar for unknown sites</span>
  <div class="toggle" id="toggle-unknown"></div>
</div>

<div class="toast" id="toast"></div>
<script src="popup.js"></script>
</body>
</html>
